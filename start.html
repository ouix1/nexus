<style>
    .scanner-panel {
        position: absolute;
        top: 120px;
        z-index: 100;
        width: 95%;
        max-width: 350px;
        left: 50%;
        transform: translateX(-50%);
    }

        .scanner-panel {
            left: 20px;
            transform: none;
        }
    }
</style>

<div class="scanner-panel bg-dark p-4 rounded-4 shadow-lg border border-secondary text-white">
    
    <h5 class="border-bottom border-secondary pb-2 mb-4 text-uppercase small tracking-widest text-center">MECHANICAL 3D SCANNER</h5>
    
    <div class="row text-center mb-4">
        <div class="col-4">
            <div class="text-secondary small">PAN (YAW)</div>
            <div id="valA" class="h3 fw-bold text-info">0.0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary small">TILT (PITCH)</div>
            <div id="valB" class="h3 fw-bold text-warning">0.0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary small">ROLL</div>
            <div id="valC" class="h3 fw-bold text-danger">0.0°</div>
        </div>
    </div>

    <div class="text-center mb-4 py-3 bg-black bg-opacity-25 rounded-3">
        <span class="text-secondary">LIDAR: </span>
        <span id="valDist" class="h3 text-success fw-bold">0cm</span>
    </div>
    
    <button id="toggleBtn" onclick="toggleScan()" class="btn btn-lg btn-primary w-100 mb-3 py-3 fw-bold shadow">
        START SCAN
    </button>

    <button onclick="resetScan()" class="btn btn-md btn-outline-light w-100 mb-3">Reset System</button>

    <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2 mt-2">
        <input class="form-check-input" type="checkbox" id="autoFollow" checked style="width: 3em; height: 1.5em;">
        <label class="form-check-label small text-secondary" for="autoFollow">Auto-Adjust Camera</label>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ======================================================================
// 1. FIREBASE CONFIGURATION
// ======================================================================

const firebaseConfig = {
  apiKey: "AIzaSyDr5USKStzLZ6OQCfTBbZBmqihhbpBNmCY",
  authDomain: "dsc-dba80.firebaseapp.com",
  projectId: "dsc-dba80",
  storageBucket: "dsc-dba80.firebasestorage.app",
  messagingSenderId: "631849635750",
  appId: "1:631849635750:web:6a43bd500ffef3cced0967",
  measurementId: "G-T7H2VFC56J",
  databaseURL: "https://dsc-dba80-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

// ======================================================================
// 2. MECHANICAL SYSTEM CONFIGURATION VARIABLES
// ======================================================================
const STEPPER_TIME_PER_360_MS = 30000; 
const SERVO_DROP_PER_ROTATION = 3.0;   
const MOTOR_START_DELAY_MS = 300;      
const SWEEP_PAUSE_MS = 300; 

const YAW_RADIUS_OFFSET_M = 0.03; 
const YAW_HEIGHT_OFFSET_M = 0.02; 
const PITCH_OFFSET_DEGREES = 5.0;

// ======================================================================
// 3. THREE.JS — CREATE A 3D ENVIRONMENT
// ======================================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020); 

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000                                         
);
camera.position.set(3, 3, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; 
controls.dampingFactor = 0.05;

const grid = new THREE.GridHelper(10, 10);
grid.position.y = -2;
scene.add(grid);

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

const originGeometry = new THREE.SphereGeometry(0.05, 16, 16); 
const originMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 }); 
const originMarker = new THREE.Mesh(originGeometry, originMaterial);
originMarker.name = "originMarker"; 
originMarker.position.set(0, 0, 0);
scene.add(originMarker);

const BOUNDS = {
    minX: -5.0, maxX: 5.0,  
    minY: -2.0, maxY: 5.0,  
    minZ: -5.0, maxZ: 5.0   
};

// --- Global State Variables ---
let allPoints = []; 
let maxTimestampProcessed = 0; 
let isScanning = false;

// Time Tracking logic to fix the "Blue Blob" and instant-start UI
let scanStartLocalTime = 0;
let firstPointTimestamp = null;
let ignoreOldData = false; 

let pointQueue = [];
let lastDrawTime = Date.now();
let lastValidPoint = null;

// ======================================================================
// 4. FUNCTION TO CREATE A POINT (DOT) IN 3D
// ======================================================================

function createDot(x, y, z) {
    if (isNaN(x) || isNaN(y) || isNaN(z)) return;

    if (x < BOUNDS.minX || x > BOUNDS.maxX || y < BOUNDS.minY || y > BOUNDS.maxY || z < BOUNDS.minZ || z > BOUNDS.maxZ) {
        return; 
    }

    if (allPoints.length > 0) {
        const last = allPoints[allPoints.length - 1];
        const d = Math.sqrt((x - last.x)**2 + (y - last.y)**2 + (z - last.z)**2);
        if (d < 0.005) return; 
    }

    const pointColor = new THREE.Color();
    const hue = Math.abs(y % 1); 
    pointColor.setHSL(hue, 1, 0.5);

    const geometry = new THREE.SphereGeometry(0.007, 8, 8);
    const material = new THREE.MeshBasicMaterial({ color: pointColor });
    const sphere = new THREE.Mesh(geometry, material);
    
    sphere.position.set(x, y, z);
    scene.add(sphere);

    const newVec = new THREE.Vector3(x, y, z);
    allPoints.push(newVec);
}

// ======================================================================
// 5. READ LIDAR DATA FROM FIREBASE AND QUEUE IT
// ======================================================================

firebase.database().ref("/fromAltera").on("value", snapshot => {
    const batchData = snapshot.val();
    if (!batchData || !Array.isArray(batchData)) return;

    let currentBatchMax = maxTimestampProcessed;

    // Detect hardware reset
    if (batchData.length > 0 && batchData[0].t !== undefined) {
        if (batchData[0].t < maxTimestampProcessed - 5000) {
            maxTimestampProcessed = 0;
            currentBatchMax = 0;
            if (isScanning) {
                scanStartLocalTime = Date.now();
                firstPointTimestamp = null;
                ignoreOldData = true;
            }
        }
    }

    // NEW: "Blue Blob" Fix. Dump all old data sitting in Firebase from a previous scan
    if (ignoreOldData) {
        batchData.forEach(p => {
            if (p.t > currentBatchMax) currentBatchMax = p.t;
        });
        maxTimestampProcessed = currentBatchMax;
        ignoreOldData = false;
        return; // Exit early so no stale data goes into the queue
    }

    batchData.forEach((dataPoint) => {
        if (dataPoint.d === undefined || dataPoint.t === undefined) return;

        if (dataPoint.t > maxTimestampProcessed) {
            pointQueue.push(dataPoint);
            
            if (dataPoint.t > currentBatchMax) {
                currentBatchMax = dataPoint.t;
            }
        }
    });

    maxTimestampProcessed = currentBatchMax;
});

// ======================================================================
// 6. PROCESS A SINGLE POINT (PERFECT SYNC MAPPING)
// ======================================================================

function processPoint(dataPoint) {
    if (!isScanning) return;

    // Synchronize Hardware clock with Software clock on the very first fresh point
    if (firstPointTimestamp === null) {
        let local_elapsed = Date.now() - scanStartLocalTime;
        // Anchor the hardware timestamp backwards so it perfectly matches our local start time
        firstPointTimestamp = dataPoint.t - local_elapsed; 
    }

    let elapsed_ms = dataPoint.t - firstPointTimestamp - MOTOR_START_DELAY_MS;

    let currentYaw = 0;
    let currentPitch = 0;

    if (elapsed_ms > 0) {
        const FULL_CYCLE_MS = STEPPER_TIME_PER_360_MS + SWEEP_PAUSE_MS;
        let sweeps = Math.floor(elapsed_ms / FULL_CYCLE_MS);
        let time_in_sweep = elapsed_ms % FULL_CYCLE_MS;

        let progress = 0;
        
        if (time_in_sweep < STEPPER_TIME_PER_360_MS) {
            progress = time_in_sweep / STEPPER_TIME_PER_360_MS;
        } else {
            progress = 1.0; 
        }

        if (sweeps % 2 === 0) {
            currentYaw = progress * 360; 
        } else {
            currentYaw = 360 - (progress * 360); 
        }

        currentPitch = (sweeps * SERVO_DROP_PER_ROTATION) + PITCH_OFFSET_DEGREES; 
    }

    const distCm = Number(dataPoint.d);
    
    // Update ONLY the Lidar Distance UI here (Angles are updated smoothly in the animate loop)
    document.getElementById("valDist").innerText = distCm + "cm";

    if (distCm > 5 && distCm <= 1200) { 
        const radiusM = distCm / 100.0; 
        let point = new THREE.Vector3(0, radiusM, 0); 
        
        const xAxis = new THREE.Vector3(1, 0, 0);
        point.applyAxisAngle(xAxis, currentPitch * (Math.PI / 180));

        point.y += YAW_HEIGHT_OFFSET_M; 
        point.z += YAW_RADIUS_OFFSET_M; 

        const yAxis = new THREE.Vector3(0, 1, 0);
        point.applyAxisAngle(yAxis, currentYaw * (Math.PI / 180));

        createDot(point.x, point.y, point.z);
        lastValidPoint = point;
    }

    if (lastValidPoint && document.getElementById("autoFollow").checked) {
        controls.target.lerp(lastValidPoint, 0.05);
    }
}

// ======================================================================
// 7. CONTROLS & RESET FUNCTIONS
// ======================================================================

function resetScan() {
    allPoints = [];
    firstPointTimestamp = null;
    scanStartLocalTime = 0;
    pointQueue = []; 
    lastValidPoint = null;
    ignoreOldData = false;

    for (let i = scene.children.length - 1; i >= 0; i--) {
        const obj = scene.children[i];
        if (obj.type === "Mesh" && obj !== grid && obj.name !== "originMarker") {
            scene.remove(obj);
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) obj.material.dispose();
        }
    }

    camera.position.set(0, 2, 5);
    controls.target.set(0, 0, 0);
    controls.update();
    
    document.getElementById("valA").innerText = "0.0°";
    document.getElementById("valB").innerText = "0.0°";
    document.getElementById("valDist").innerText = "0cm";

    const dbRef = firebase.database().ref('toAltera');
    dbRef.set(1).catch(err => console.error("Firebase Set Error:", err));
}

window.onload = function() {
    const dbRef = firebase.database().ref('toAltera');
    const btn = document.getElementById('toggleBtn');

    dbRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val === 0) {
            if (!isScanning) {
                isScanning = true;
                scanStartLocalTime = Date.now(); // Start the UI spin immediately
                ignoreOldData = true; // Drop stale Firebase data to prevent the blue blob
                pointQueue = []; 
                firstPointTimestamp = null;
            }
            btn.innerText = "STOP SCAN";
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-danger');
        } else {
            isScanning = false;
            btn.innerText = "START SCAN";
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-primary');
        }
    });
};

function toggleScan() {
    const dbRef = firebase.database().ref('toAltera');
    if (!isScanning) {
        dbRef.set(0); 
    } else {
        dbRef.set(2); 
    }
}

// ======================================================================
// 8. ANIMATION & ELASTIC QUEUE PROCESSING LOOP
// ======================================================================

function animate() {
    requestAnimationFrame(animate);

    let now = Date.now();
    let timeElapsed = now - lastDrawTime;

    // --- INSTANT SMOOTH UI UPDATES ---
    // The UI now spins perfectly based on time, exactly mirroring the real scanner
    if (isScanning && scanStartLocalTime > 0) {
        let ui_elapsed = Date.now() - scanStartLocalTime - MOTOR_START_DELAY_MS;
        let uiYaw = 0;
        let uiPitch = 0;

        if (ui_elapsed > 0) {
            const FULL_CYCLE_MS = STEPPER_TIME_PER_360_MS + SWEEP_PAUSE_MS;
            let sweeps = Math.floor(ui_elapsed / FULL_CYCLE_MS);
            let time_in_sweep = ui_elapsed % FULL_CYCLE_MS;
            
            let progress = time_in_sweep < STEPPER_TIME_PER_360_MS ? time_in_sweep / STEPPER_TIME_PER_360_MS : 1.0;
            
            if (sweeps % 2 === 0) {
                uiYaw = progress * 360; 
            } else {
                uiYaw = 360 - (progress * 360); 
            }
            uiPitch = (sweeps * SERVO_DROP_PER_ROTATION) + PITCH_OFFSET_DEGREES; 
        }

        document.getElementById("valA").innerText = uiYaw.toFixed(1) + "°";
        document.getElementById("valB").innerText = uiPitch.toFixed(1) + "°";
    }

    // --- QUEUE PROCESSOR ---
    if (pointQueue.length > 0) {
        let dynamicDrawInterval = 166; 

        if (pointQueue.length > 60) dynamicDrawInterval = 5; 
        else if (pointQueue.length > 40) dynamicDrawInterval = 50; 
        else if (pointQueue.length > 20) dynamicDrawInterval = 120;
        else if (pointQueue.length > 8) dynamicDrawInterval = 250; 
        else dynamicDrawInterval = 400; 

        while (timeElapsed > dynamicDrawInterval && pointQueue.length > 0) {
            let nextDataPoint = pointQueue.shift();
            processPoint(nextDataPoint);
            timeElapsed -= dynamicDrawInterval;
            lastDrawTime = now - timeElapsed; 
        }
    }

    if (controls) {
        controls.update(); 
    }

    renderer.render(scene, camera);
}

animate();

</script>

</body>
