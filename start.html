============================================================== -->

<script>
// ======================================================================
// 1. FIREBASE CONFIGURATION
// ======================================================================

// Your Firebase project settings — required to connect to your database
const firebaseConfig = {
  apiKey: "AIzaSyDr5USKStzLZ6OQCfTBbZBmqihhbpBNmCY",
  authDomain: "dsc-dba80.firebaseapp.com",
  projectId: "dsc-dba80",
  storageBucket: "dsc-dba80.firebasestorage.app",
  messagingSenderId: "631849635750",
  appId: "1:631849635750:web:6a43bd500ffef3cced0967",
  measurementId: "G-T7H2VFC56J",
  databaseURL: "https://dsc-dba80-default-rtdb.firebaseio.com/"
};

// Start Firebase using the above config
firebase.initializeApp(firebaseConfig);

// Print Firebase object to the console to confirm it's running
console.log("Firebase:", firebase);


// ======================================================================
// 2. THREE.JS — CREATE A 3D ENVIRONMENT
// ======================================================================

console.log("THREE:", THREE);

// Create a 3D "world" where objects will exist
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);   // Dark grey background

// Create a perspective camera (like the human eye)
const camera = new THREE.PerspectiveCamera(
  75,                                          // field of view (degrees)
  window.innerWidth / window.innerHeight,      // aspect ratio
  0.1,                                         // near clipping distance
  1000                                         // far clipping distance
);

// Move the camera back so we can see the 3D space
camera.position.set(3, 3, 3);

// Create the WebGL renderer (draws the 3D graphics)
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// Add the 3D canvas to the page
document.body.appendChild(renderer.domElement);

// ==========================================
// 3. INITIALIZE CONTROLS HERE (The Fix)
// ==========================================
controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; 
controls.dampingFactor = 0.05;

// Create a grid floor for visual reference (10x10)
const grid = new THREE.GridHelper(10, 10);
// Move it DOWN 2 meters
grid.position.y = -2;
scene.add(grid);

// Add a light so objects are visible
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);


// ======================================================================
// 3. FUNCTION TO CREATE A POINT (DOT) IN 3D
// ======================================================================
let boundingBox = new THREE.Box3();
// --- 1. Global State Variables ---
let yaw = 0, pitch = 0, roll = 0;
let lastTimestamp = Date.now();
let allPoints = []; // To store points for exporting later
// --- REPLACE YOUR CURRENT VARIABLES WITH THESE ---
let maxTimestampProcessed = 0; // Tracks the absolute newest point we've seen
const ALPHA = 0.96; 
const GYRO_DEADZONE = 5.0; // Increased! (See section 2 below)
let isFirstPoint = true;

function createDot(x, y, z) {
    if (isNaN(x) || isNaN(y) || isNaN(z)) return;

    if (allPoints.length > 0) {
        const last = allPoints[allPoints.length - 1];
        const d = Math.sqrt((x - last.x)**2 + (y - last.y)**2 + (z - last.z)**2);
        if (d < 0.03) return; // 3cm threshold
    }

    const pointColor = new THREE.Color();
    const hue = Math.abs(y % 1); 
    pointColor.setHSL(hue, 1, 0.5);

    const geometry = new THREE.SphereGeometry(0.02, 8, 8);
    const material = new THREE.MeshBasicMaterial({ color: pointColor });
    const sphere = new THREE.Mesh(geometry, material);
    
    sphere.position.set(x, y, z);
    scene.add(sphere);

    const newVec = new THREE.Vector3(x, y, z);
    allPoints.push(newVec);
    
    // NOTE: Removed the expandCameraToFit call from here to prevent massive lag.
    // It will now be handled once per batch at the bottom of the Firebase listener.
}


// ======================================================================
// 4. READ LIDAR DATA FROM FIREBASE AND DRAW DOTS
// ======================================================================
let lastEspTimestamp = 0;

firebase.database().ref("/fromAltera").on("value", snapshot => {
    const batchData = snapshot.val();
    if (!batchData || !Array.isArray(batchData)) return;

    let lastValidPoint = null;

    batchData.forEach((dataPoint) => {
        if (!dataPoint.g || !dataPoint.a || dataPoint.d === undefined || dataPoint.t === undefined) return;

        if (dataPoint.t <= maxTimestampProcessed) return;

        if (maxTimestampProcessed === 0) {
            maxTimestampProcessed = dataPoint.t;
            return; 
        }
        
        const dt = (dataPoint.t - maxTimestampProcessed) / 1000.0;
        maxTimestampProcessed = dataPoint.t; 

        // Reject bad timestamps (dt > 0.2 means 200ms gap, which ruins integration)
        if (dt <= 0 || dt > 0.2) return; 

        // --- Step 1: Gyro Deadzone (Keep it low for smooth scans) ---
        const GYRO_DEADZONE = 5.0; 
        const gx = Math.abs(dataPoint.g.x) > GYRO_DEADZONE ? dataPoint.g.x : 0;
        const gy = Math.abs(dataPoint.g.y) > GYRO_DEADZONE ? dataPoint.g.y : 0;
        const gz = Math.abs(dataPoint.g.z) > GYRO_DEADZONE ? dataPoint.g.z : 0;

        // --- Step 2: CUSTOM ACCELEROMETER REMAPPING ---
        // Because X is your vertical axis (gravity), X acts as the base for our math.
        
        // Pitch: Tilting up/down. This rotates around your physical Y-axis.
        // It changes the balance of gravity between the X (vertical) and Z (forward) axes.
        const accPitch = Math.atan2(dataPoint.a.z, dataPoint.a.x) * (180 / Math.PI);
        
        // Roll: Tilting side-to-side. This rotates around your physical Z-axis.
        // It changes the balance of gravity between the X (vertical) and Y (lateral) axes.
        const accRoll = Math.atan2(dataPoint.a.y, dataPoint.a.x) * (180 / Math.PI);

        if (isFirstPoint) {
            pitch = accPitch;
            roll = accRoll;
            yaw = 0; // Always start facing "forward" in the 3D world
            isFirstPoint = false;
        } else {
            // Gyro Remapping based on your physical layout:
            // g.y rotates around Y -> Pitch (nodding up/down)
            // g.z rotates around Z -> Roll (steering wheel tilt)
            // g.x rotates around X -> Yaw (panning left/right, since X is vertical)
            
            pitch = ALPHA * (pitch + gy * dt) + (1 - ALPHA) * accPitch;
            roll = ALPHA * (roll + gz * dt) + (1 - ALPHA) * accRoll;
            yaw += gx * dt; 
        }

        // --- Step 3: 3D Mapping ---
        const distCm = Number(dataPoint.d);
        if (distCm <= 5 || distCm > 1200) return; 

        const radius = distCm / 100.0; 
        
        // CRITICAL CHANGE: If LIDAR is opposite the down-facing pins, it points UP.
        // In Three.js, Y is the UP axis. 
        let point = new THREE.Vector3(0, radius, 0); 
        
        // Standard Three.js order (Y is Yaw, X is Pitch, Z is Roll)
        const euler = new THREE.Euler(
            pitch * (Math.PI / 180),
            yaw * (Math.PI / 180),
            roll * (Math.PI / 180),
            'YXZ' 
        );

        point.applyEuler(euler);
        createDot(point.x, point.y, point.z);
        
        lastValidPoint = point;
    
    });

    // --- Step 4: Update UI elements ---
    const lastData = batchData[batchData.length - 1];
    document.getElementById("valA").innerText = Math.round(yaw) + "°";
    document.getElementById("valB").innerText = Math.round(pitch) + "°";
    document.getElementById("valC").innerText = Math.round(roll) + "°";
    document.getElementById("valDist").innerText = lastData.d + "cm";

    // --- Step 5: Update Camera efficiently ---
    // NOTE: I replaced expandCameraToFit because it is missing from your code and will cause an error!
    if (lastValidPoint && document.getElementById("autoFollow").checked) {
        controls.target.lerp(lastValidPoint, 0.05); // Smoothly drags the camera center to the new points
    }
});

// Function to Reset the Scan
function resetScan() {
    

    // 1. Reset Data
    allPoints = [];
    boundingBox.makeEmpty();
    yaw = 0; pitch = 0; roll = 0;
    isFirstPoint = true; // <-- ADD THIS LINE

    // 2. Clear Scene (Looping backwards is the key)
    for (let i = scene.children.length - 1; i >= 0; i--) {
        const obj = scene.children[i];
        // Don't delete the grid or the camera!
        if (obj.type === "Mesh" && obj !== grid) {
            scene.remove(obj);
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) obj.material.dispose();
        }
    }

    // 3. Reset Camera Position to a safe distance
    camera.position.set(0, 2, 5);
    controls.target.set(0, 0, 0);
    controls.update();
    
    const btn = document.getElementById('toggleBtn');
    const targetRef = database.ref('toAltera');

    targetRef.set(1).then(() => {
            isScanning = false;
            btn.innerText = "START SCAN";
            btn.classList.replace('btn-danger', 'btn-primary'); // Change color back to blue
        }).catch(err => console.error("Firebase Set Error:", err));
        
    console.log("Scan Cleared and Camera Reset");
}


// ======================================================================
// 5. ANIMATION LOOP — REDRAWS THE SCENE 60FPS
// ======================================================================

// Runs continuously to update the graphics
function animate() {
    requestAnimationFrame(animate);

    // This makes the 'lerp' and 'target' changes actually happen on screen
    if (controls) {
        controls.update(); 
    }

    renderer.render(scene, camera);
}
// Make sure this is called once to start the loop
animate();

// Global scope variables
let isScanning = false;

window.onload = function() {
    // 1. Initialize Reference
    const dbRef = firebase.database().ref('toAltera');
    const btn = document.getElementById('toggleBtn');

    // 2. THE LISTENER: This is the part that updates WITHOUT refreshing
    // We use .on('value', ...) which keeps a persistent connection open
    dbRef.on('value', (snapshot) => {
        const val = snapshot.val();
        console.log("Database changed to:", val); // Check your browser console

        if (val === 0) {
            isScanning = true;
            btn.innerText = "STOP SCAN";
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-danger');
        } else {
            isScanning = false;
            btn.innerText = "START SCAN";
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-primary');
        }
    }, (error) => {
        console.error("The read failed: ", error.code);
    });
};

// 3. THE ACTION: This only sends data; the listener above handles the UI
function toggleScan() {
    const dbRef = firebase.database().ref('toAltera');
    
    if (!isScanning) {
        // Send 0 to Start
        dbRef.set(0);
    } else {
        // Send 2 to Stop
        dbRef.set(2);
    }
}
</script>
