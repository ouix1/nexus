<style>

</style>

<div class="scanner-panel bg-dark p-4 rounded-4 shadow-lg border border-secondary text-white">
    
    <h5 class="border-bottom border-secondary pb-2 mb-4 text-uppercase small tracking-widest text-center">MECHANICAL 3D SCANNER</h5>
    
    <div class="row text-center mb-4">
        <div class="col-4">
            <div class="text-secondary small">PAN (YAW)</div>
            <div id="valA" class="h3 fw-bold text-info">0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary small">TILT (PITCH)</div>
            <div id="valB" class="h3 fw-bold text-warning">0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary small">ROLL</div>
            <div id="valC" class="h3 fw-bold text-danger">0°</div>
        </div>
    </div>

    <div class="text-center mb-4 py-3 bg-black bg-opacity-25 rounded-3">
        <span class="text-secondary">LIDAR: </span>
        <span id="valDist" class="h3 text-success fw-bold">0cm</span>
    </div>
    
    <button id="toggleBtn" onclick="toggleScan()" class="btn btn-lg btn-primary w-100 mb-3 py-3 fw-bold shadow">
        START SCAN
    </button>

    <button onclick="resetScan()" class="btn btn-md btn-outline-light w-100 mb-3">Reset System</button>

    <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2 mt-2">
        <input class="form-check-input" type="checkbox" id="autoFollow" checked style="width: 3em; height: 1.5em;">
        <label class="form-check-label small text-secondary" for="autoFollow">Auto-Adjust Camera</label>
    </div>
</div>

<style> .tiny { font-size: 0.6rem; } </style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ======================================================================
// 1. FIREBASE CONFIGURATION
// ======================================================================

const firebaseConfig = {
  apiKey: "AIzaSyDr5USKStzLZ6OQCfTBbZBmqihhbpBNmCY",
  authDomain: "dsc-dba80.firebaseapp.com",
  projectId: "dsc-dba80",
  storageBucket: "dsc-dba80.firebasestorage.app",
  messagingSenderId: "631849635750",
  appId: "1:631849635750:web:6a43bd500ffef3cced0967",
  measurementId: "G-T7H2VFC56J",
  databaseURL: "https://dsc-dba80-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

// ======================================================================
// 2. MECHANICAL SYSTEM CONFIGURATION VARIABLES
// ======================================================================
const STEPPER_TIME_PER_360_MS = 30000; 
const SERVO_DROP_PER_ROTATION = 6;   
const MOTOR_START_DELAY_MS = 300;      

// ======================================================================
// 3. THREE.JS — CREATE A 3D ENVIRONMENT
// ======================================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020); 

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000                                         
);
camera.position.set(3, 3, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; 
controls.dampingFactor = 0.05;

const grid = new THREE.GridHelper(10, 10);
grid.position.y = -2;
scene.add(grid);

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

const BOUNDS = {
    minX: -5.0, maxX: 5.0,  
    minY: -2.0, maxY: 5.0,  
    minZ: -5.0, maxZ: 5.0   
};

// --- Global State Variables (Mechanical 3D) ---
let yaw = 0, pitch = 0, roll = 0;
let allPoints = []; 
let maxTimestampProcessed = 0; 
let isScanning = false;

// --- Global State Variables (MPU UI Display) ---
let mpuYaw = 0, mpuPitch = 0, mpuRoll = 0;
let lastMpuTimestamp = 0;
let isFirstMpuPoint = true;
const ALPHA = 0.96;

// Variables for mechanical calculation tracking
let scanState = 'IDLE'; 
let firstPointTimestamp = 0;
let lastValidPoint = null;

// Queuing system variables
let pointQueue = [];
let lastDrawTime = Date.now();

// ======================================================================
// 4. FUNCTION TO CREATE A POINT (DOT) IN 3D
// ======================================================================

function createDot(x, y, z) {
    if (isNaN(x) || isNaN(y) || isNaN(z)) return;

    if (x < BOUNDS.minX || x > BOUNDS.maxX || y < BOUNDS.minY || y > BOUNDS.maxY || z < BOUNDS.minZ || z > BOUNDS.maxZ) {
        return; 
    }

    // 0.5cm (0.005) minimum distance check between points
    if (allPoints.length > 0) {
        const last = allPoints[allPoints.length - 1];
        const d = Math.sqrt((x - last.x)**2 + (y - last.y)**2 + (z - last.z)**2);
        if (d < 0.005) return; 
    }

    const pointColor = new THREE.Color();
    const hue = Math.abs(y % 1); 
    pointColor.setHSL(hue, 1, 0.5);

    // 1mm radius (2mm diameter) for cleaner looking points
    const geometry = new THREE.SphereGeometry(0.007, 8, 8);
    const material = new THREE.MeshBasicMaterial({ color: pointColor });
    const sphere = new THREE.Mesh(geometry, material);
    
    sphere.position.set(x, y, z);
    scene.add(sphere);

    const newVec = new THREE.Vector3(x, y, z);
    allPoints.push(newVec);
}

// ======================================================================
// 5. READ LIDAR DATA FROM FIREBASE AND QUEUE IT
// ======================================================================

firebase.database().ref("/fromAltera").on("value", snapshot => {
    const batchData = snapshot.val();
    if (!batchData || !Array.isArray(batchData)) return;

    let currentBatchMax = maxTimestampProcessed;

    // Detect if the ESP/Hardware restarted (timestamps suddenly reset to 0)
    if (batchData.length > 0 && batchData[0].t !== undefined) {
        if (batchData[0].t < maxTimestampProcessed - 5000) {
            maxTimestampProcessed = 0;
            currentBatchMax = 0;
            firstPointTimestamp = batchData[0].t; 
        }
    }

    batchData.forEach((dataPoint) => {
        if (dataPoint.d === undefined || dataPoint.t === undefined) return;

        // Queue newly seen points
        if (dataPoint.t > maxTimestampProcessed) {
            pointQueue.push(dataPoint);
            
            if (dataPoint.t > currentBatchMax) {
                currentBatchMax = dataPoint.t;
            }
        }
    });

    maxTimestampProcessed = currentBatchMax;
});

// ======================================================================
// 6. PROCESS A SINGLE POINT (MECHANICAL LOGIC + MPU UI LOGIC)
// ======================================================================

function processPoint(dataPoint) {
    if (scanState === 'IDLE') return;

    if (scanState === 'WAITING_FIRST_POINT') {
        firstPointTimestamp = dataPoint.t;
        scanState = 'SCANNING';
    }

    // --- PART A: MPU6050 LOGIC (FOR UI ONLY) ---
    if (dataPoint.g && dataPoint.a) {
        let dt = 0.02; // Default for first reading
        if (!isFirstMpuPoint && lastMpuTimestamp !== 0) {
            dt = (dataPoint.t - lastMpuTimestamp) / 1000.0;
            if (dt <= 0 || dt > 1.0) dt = 0.02; 
        }
        lastMpuTimestamp = dataPoint.t;

        const gy = dataPoint.g.y; 
        const gx = dataPoint.g.x; 
        const gz = dataPoint.g.z; 

        const accPitch = Math.atan2(dataPoint.a.z, dataPoint.a.x) * (180 / Math.PI);
        const accRoll = Math.atan2(dataPoint.a.y, dataPoint.a.x) * (180 / Math.PI);

        if (isFirstMpuPoint) {
            mpuPitch = accPitch;
            mpuRoll = accRoll; 
            mpuYaw = 0;
            isFirstMpuPoint = false;
        } else {
            mpuPitch = ALPHA * (mpuPitch + gy * dt) + (1 - ALPHA) * accPitch;
            mpuRoll = ALPHA * (mpuRoll + gz * dt) + (1 - ALPHA) * accRoll;
            mpuYaw += gx * dt; 
        }
    }

    // --- PART B: PING-PONG MECHANICAL LOGIC (FOR 3D DOTS ONLY) ---
    let elapsed_ms = dataPoint.t - firstPointTimestamp;
    let moving_time_ms = elapsed_ms - MOTOR_START_DELAY_MS;

    let currentYaw = 0;
    let currentPitch = 0;

    if (moving_time_ms > 0) {
        let sweeps = Math.floor(moving_time_ms / STEPPER_TIME_PER_360_MS);
        let progress = (moving_time_ms % STEPPER_TIME_PER_360_MS) / STEPPER_TIME_PER_360_MS;

        // Even sweeps go forward, Odd sweeps go backward
        if (sweeps % 2 === 0) {
            currentYaw = progress * 360; 
        } else {
            currentYaw = 360 - (progress * 360); 
        }

        currentPitch = sweeps * SERVO_DROP_PER_ROTATION; 
    }

    yaw = currentYaw;
    pitch = currentPitch;
    roll = 0;

    const distCm = Number(dataPoint.d);
    if (distCm > 5 && distCm <= 1200) { 
        const radius = distCm / 100.0; 
        
        let point = new THREE.Vector3(0, radius, 0); 
        
        const xAxis = new THREE.Vector3(1, 0, 0);
        point.applyAxisAngle(xAxis, pitch * (Math.PI / 180));

        const yAxis = new THREE.Vector3(0, 1, 0);
        point.applyAxisAngle(yAxis, yaw * (Math.PI / 180));

        createDot(point.x, point.y, point.z);
        lastValidPoint = point;
    }

    // --- PART C: UPDATE UI WITH CONSTRAINED ANGLES ---
    let displayYaw = ((mpuYaw % 360) + 360) % 360; 
    let displayPitch = ((mpuPitch % 360) + 360) % 360;
    if (displayPitch > 180) displayPitch -= 360; 

    document.getElementById("valA").innerText = Math.round(displayYaw) + "°";
    document.getElementById("valB").innerText = Math.round(displayPitch) + "°";
    document.getElementById("valC").innerText = Math.round(mpuRoll) + "°"; 
    document.getElementById("valDist").innerText = distCm + "cm";

    if (lastValidPoint && document.getElementById("autoFollow").checked) {
        controls.target.lerp(lastValidPoint, 0.05);
    }
}

// ======================================================================
// 7. CONTROLS & RESET FUNCTIONS
// ======================================================================

function resetScan() {
    allPoints = [];
    yaw = 0; pitch = 0; roll = 0;
    
    scanState = 'IDLE';
    firstPointTimestamp = 0;
    maxTimestampProcessed = 0;
    pointQueue = []; 
    lastValidPoint = null;

    mpuYaw = 0; mpuPitch = 0; mpuRoll = 0;
    lastMpuTimestamp = 0;
    isFirstMpuPoint = true;

    for (let i = scene.children.length - 1; i >= 0; i--) {
        const obj = scene.children[i];
        if (obj.type === "Mesh" && obj !== grid) {
            scene.remove(obj);
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) obj.material.dispose();
        }
    }

    camera.position.set(0, 2, 5);
    controls.target.set(0, 0, 0);
    controls.update();
    
    document.getElementById("valA").innerText = "0°";
    document.getElementById("valB").innerText = "0°";
    document.getElementById("valC").innerText = "0°"; 
    document.getElementById("valDist").innerText = "0cm";

    const dbRef = firebase.database().ref('toAltera');
    dbRef.set(1).catch(err => console.error("Firebase Set Error:", err));
}

window.onload = function() {
    const dbRef = firebase.database().ref('toAltera');
    const btn = document.getElementById('toggleBtn');

    dbRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val === 0) {
            isScanning = true;
            scanState = 'WAITING_FIRST_POINT'; 
            btn.innerText = "STOP SCAN";
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-danger');
        } else {
            isScanning = false;
            scanState = 'IDLE'; 
            btn.innerText = "START SCAN";
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-primary');
        }
    });
};

function toggleScan() {
    const dbRef = firebase.database().ref('toAltera');
    if (!isScanning) {
        dbRef.set(0); 
    } else {
        dbRef.set(2); 
    }
}

// ======================================================================
// 8. ANIMATION & ELASTIC QUEUE PROCESSING LOOP
// ======================================================================

function animate() {
    requestAnimationFrame(animate);

    let now = Date.now();
    let timeElapsed = now - lastDrawTime;

    // Elastic Rubber Band Logic
    if (pointQueue.length > 0) {
        let dynamicDrawInterval = 166; // Standard pace (~30 points in 5 seconds)

        // If the queue is huge, drop interval to catch up instantly
        if (pointQueue.length > 60) dynamicDrawInterval = 5; 
        else if (pointQueue.length > 40) dynamicDrawInterval = 50; 
        // If the queue is healthy, proceed normally
        else if (pointQueue.length > 20) dynamicDrawInterval = 120;
        // If the queue is running out (batch is late), slow down to stretch out the animation
        else if (pointQueue.length > 8) dynamicDrawInterval = 250; 
        else dynamicDrawInterval = 400; // Almost empty, stretch it as long as possible

        // Draw points based on the dynamic interval
        while (timeElapsed > dynamicDrawInterval && pointQueue.length > 0) {
            let nextDataPoint = pointQueue.shift();
            processPoint(nextDataPoint);
            timeElapsed -= dynamicDrawInterval;
            lastDrawTime = now - timeElapsed; // Carries over remainder milliseconds flawlessly
        }
    }

    if (controls) {
        controls.update(); 
    }

    renderer.render(scene, camera);
}

animate();

</script>
