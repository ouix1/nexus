<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LIDAR 3D Viewer - Secured Live Sync</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #181818; }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css"> 
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="home.html">
      ne<span style="color: #0d6efd">x</span>us
    </a>
  </div>
</nav>

<style>
    /* Main Control Panel (Left) */
    .scanner-panel {
        position: absolute;
        top: 80px;
        z-index: 100;
        width: 95%;
        max-width: 380px;
        left: 50%;
        transform: translateX(-50%);
    }
    
    /* Progress Panel (Right) */
    .progress-panel {
        position: absolute;
        top: 80px;
        right: 20px;
        z-index: 100;
        width: 300px;
        display: none; 
    }

    @media (min-width: 768px) {
        .scanner-panel { left: 20px; transform: none; }
        .progress-panel { display: block; }
    }
    
    @media (max-width: 767px) {
        .progress-panel {
            top: auto;
            bottom: 20px;
            right: 50%;
            transform: translateX(50%);
            display: block;
            width: 95%;
            max-width: 380px;
        }
    }
</style>

<!-- LEFT PANEL: CONTROLS -->
<div class="scanner-panel bg-dark p-3 rounded-4 shadow-lg border border-secondary text-white">
    
    <h6 class="border-bottom border-secondary pb-2 mb-3 text-uppercase tracking-widest text-center text-light position-relative">
        MECHANICAL 3D SCANNER
        <!-- SECURED ADMIN PADLOCK ICON -->
        <i class="bi bi-lock-fill position-absolute end-0 text-secondary" style="cursor: pointer; top: 0;" id="adminLockBtn" onclick="promptAdmin()" title="Admin Login"></i>
    </h6>
    
    <div class="row text-center mb-3">
        <div class="col-4">
            <div class="text-secondary" style="font-size: 0.7rem;">PITCH (IMU)</div>
            <div id="valB" class="h5 fw-bold text-warning">0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary" style="font-size: 0.7rem;">ROLL (IMU)</div>
            <div id="valC" class="h5 fw-bold text-danger">0°</div>
        </div>
        <div class="col-4">
            <div class="text-secondary" style="font-size: 0.7rem;">LIDAR</div>
            <div id="valDist" class="h5 fw-bold text-success">0cm</div>
        </div>
    </div>
    
    <button id="toggleBtn" onclick="toggleScan()" class="btn btn-primary w-100 mb-2 fw-bold shadow-sm">
        START SCAN
    </button>
    <button onclick="resetScan()" class="btn btn-sm btn-outline-light w-100 mb-2">Reset System</button>

    <!-- LIVE TUNING DROPDOWN (HIDDEN BY DEFAULT, REQUIRES PASSWORD) -->
    <div class="dropdown mt-3" id="tuningDropdownWrapper" style="display: none;">
        <button class="btn btn-outline-info w-100 dropdown-toggle fw-bold" type="button" id="tuningDropdown" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
            <i class="bi bi-sliders me-2"></i> Admin: Live Calibration
        </button>
        <div class="dropdown-menu dropdown-menu-dark p-3 shadow-lg border border-info" aria-labelledby="tuningDropdown" style="width: 100%;">
            <h6 class="text-info text-center mb-3" style="font-size: 0.75rem;">GLOBAL BROADCAST ACTIVE</h6>
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Start Delay: <span id="lblDelay" class="text-info fw-bold">300ms</span></label>
                    <input type="range" class="form-range" id="delaySlider" min="-1000" max="3000" step="10" oninput="onAdminSliderMove()">
                </div>
                <div class="col-6">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Sweep Time: <span id="lblSpeed" class="text-info fw-bold">5000ms</span></label>
                    <input type="range" class="form-range" id="speedSlider" min="3000" max="7000" step="10" oninput="onAdminSliderMove()">
                </div>
                <div class="col-6">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Start Pitch: <span id="lblInitPitch" class="text-info fw-bold">90°</span></label>
                    <input type="range" class="form-range" id="initPitchSlider" min="45" max="135" step="1" oninput="onAdminSliderMove()">
                </div>
                <div class="col-6">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Pitch Drop: <span id="lblPitchDrop" class="text-info fw-bold">1.5°</span></label>
                    <input type="range" class="form-range" id="pitchDropSlider" min="0.1" max="5.0" step="0.1" oninput="onAdminSliderMove()">
                </div>
                <div class="col-12 mt-2">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Max Distance Limit: <span id="lblDist" class="text-warning fw-bold">600cm</span></label>
                    <input type="range" class="form-range" id="distSlider" min="100" max="1200" step="10" oninput="onAdminSliderMove()">
                </div>
                <div class="col-12 mt-1">
                    <label class="form-label text-light mb-0" style="font-size: 0.7rem;">Edge Noise Filter: <span id="lblEdge" class="text-success fw-bold">40cm</span></label>
                    <input type="range" class="form-range" id="edgeSlider" min="5" max="200" step="5" oninput="onAdminSliderMove()">
                    <div class="text-muted" style="font-size: 0.6rem;">Drops points that jump too fast</div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-check form-switch d-flex justify-content-center align-items-center gap-2 mt-3">
        <input class="form-check-input" type="checkbox" id="autoFollow" checked>
        <label class="form-check-label text-secondary" style="font-size: 0.8rem;" for="autoFollow">Auto-Adjust Camera</label>
    </div>
</div>

<!-- RIGHT PANEL: PROGRESS HUD -->
<div class="progress-panel bg-dark p-3 rounded-4 shadow-lg border border-secondary text-white">
    <h6 class="border-bottom border-secondary pb-2 mb-2 text-uppercase tracking-widest text-center text-light" style="font-size: 0.8rem;">SCAN PROGRESS (170°)</h6>
    <div class="d-flex justify-content-between text-secondary mb-1" style="font-size: 0.75rem;">
        <span id="scanProgressText" class="fw-bold">0 / -- Spins</span>
        <span id="scanTimeLeft" class="text-info">--:-- left</span>
    </div>
    <div class="progress bg-black border border-secondary" style="height: 12px;">
        <div id="scanProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%; transition: width 0.5s ease;"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ======================================================================
// 1. FIREBASE CONFIGURATION & SECURITY
// ======================================================================
const firebaseConfig = {
  apiKey: "AIzaSyDr5USKStzLZ6OQCfTBbZBmqihhbpBNmCY",
  authDomain: "dsc-dba80.firebaseapp.com",
  projectId: "dsc-dba80",
  storageBucket: "dsc-dba80.firebasestorage.app",
  messagingSenderId: "631849635750",
  appId: "1:631849635750:web:6a43bd500ffef3cced0967",
  databaseURL: "https://dsc-dba80-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);

let isAuthenticated = false;

// Prompts the user for the password when clicking the Padlock
function promptAdmin() {
    let pwd = prompt("Enter Administrator Password for Live Calibration:");
    if (pwd === "sisma332") {
        isAuthenticated = true;
        document.getElementById('adminLockBtn').style.display = 'none'; // Hide padlock
        document.getElementById('tuningDropdownWrapper').style.display = 'block'; // Show dropdown
        updateAdminUIFromParams(); // Populate sliders with current global params
    } else if (pwd !== null) {
        alert("Access Denied: Incorrect Password.");
    }
}

// ======================================================================
// 2. MECHANICAL SYSTEM CONSTANTS & GLOBAL LIVE PARAMS
// ======================================================================
const SWEEP_PAUSE_MS = 300; 
const YAW_RADIUS_OFFSET_M = 0.055; 
const YAW_HEIGHT_OFFSET_M = 0.04; 
const TARGET_TOTAL_DROP_DEGREES = 170; // Physical hardware limit of the scanner

// This object is the "Brain" used by EVERYONE (Admins and regular viewers)
let liveParams = {
    delay: 300,
    speed: 5000,
    initPitch: 90,
    pitchDrop: 1.5,
    distLimit: 600,
    edgeLimit: 40
};

// ======================================================================
// 3. THREE.JS — HIGH PERFORMANCE POINT CLOUD
// ======================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x181818); 

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(2, 2, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; 
controls.dampingFactor = 0.05;

const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
grid.position.y = -1;
scene.add(grid);

const originMarker = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
scene.add(originMarker);

let pointCloudGeometry = new THREE.BufferGeometry();
let pointCloudMaterial = new THREE.PointsMaterial({ size: 0.025, vertexColors: true });
let pointCloud = new THREE.Points(pointCloudGeometry, pointCloudMaterial);
pointCloud.frustumCulled = false; // CAMERA FIX: Prevents points from disappearing when looking away!
scene.add(pointCloud);

let rawScannedData = []; 
let isScanning = false;
let maxTimestampProcessed = 0; 
let hardwareStartTime = 0;
let isFirstHardwarePoint = true;

// ======================================================================
// 4. LIVE TUNING SYNC ENGINE (DECOUPLED FROM UI)
// ======================================================================

// Triggered ONLY by the Admin physically moving a slider
function onAdminSliderMove() {
    if (!isAuthenticated) return;

    // 1. Read sliders into the Global Brain
    liveParams.delay = parseInt(document.getElementById('delaySlider').value);
    liveParams.speed = parseInt(document.getElementById('speedSlider').value);
    liveParams.initPitch = parseFloat(document.getElementById('initPitchSlider').value);
    liveParams.pitchDrop = parseFloat(document.getElementById('pitchDropSlider').value);
    liveParams.distLimit = parseInt(document.getElementById('distSlider').value);
    liveParams.edgeLimit = parseInt(document.getElementById('edgeSlider').value);

    // 2. Update Admin text labels
    updateAdminUIFromParams();

    // 3. Rebuild the Admin's 3D Cloud locally instantly
    rebuildPointCloud();

    // 4. Broadcast changes to all other viewers via Firebase
    firebase.database().ref('/liveSync').set(liveParams);
}

// Triggered for EVERYONE when Firebase broadcasts new settings
firebase.database().ref('/liveSync').on('value', snapshot => {
    const data = snapshot.val();
    if (data) {
        // Update the global brain for all users
        liveParams.delay = parseInt(data.delay) || 300;
        liveParams.speed = parseInt(data.speed) || 5000;
        liveParams.initPitch = parseFloat(data.initPitch) || 90;
        liveParams.pitchDrop = parseFloat(data.pitchDrop) || 1.5;
        liveParams.distLimit = parseInt(data.distLimit) || 600;
        liveParams.edgeLimit = parseInt(data.edgeLimit) || 40;

        // Rebuild the 3D Map for everyone based on new parameters
        rebuildPointCloud();

        // If an Admin has the UI open, update their physical sliders so they match the remote broadcast
        if (isAuthenticated) {
            updateAdminUIFromParams();
        }
    }
});

// Updates the visible sliders and text labels (Only relevant for Admins)
function updateAdminUIFromParams() {
    document.getElementById('delaySlider').value = liveParams.delay;
    document.getElementById('speedSlider').value = liveParams.speed;
    document.getElementById('initPitchSlider').value = liveParams.initPitch;
    document.getElementById('pitchDropSlider').value = liveParams.pitchDrop;
    document.getElementById('distSlider').value = liveParams.distLimit;
    document.getElementById('edgeSlider').value = liveParams.edgeLimit;

    document.getElementById('lblDelay').innerText = liveParams.delay + "ms";
    document.getElementById('lblSpeed').innerText = liveParams.speed + "ms";
    document.getElementById('lblInitPitch').innerText = liveParams.initPitch + "°";
    document.getElementById('lblPitchDrop').innerText = liveParams.pitchDrop + "°";
    document.getElementById('lblDist').innerText = liveParams.distLimit + "cm";
    document.getElementById('lblEdge').innerText = liveParams.edgeLimit == 200 ? "OFF" : liveParams.edgeLimit + "cm";
}

// Math Engine: Rebuilds 3D Points using pure JS variables (NO direct DOM dependencies)
function rebuildPointCloud() {
    if (rawScannedData.length === 0) return;

    const positions = [];
    const colors = [];
    const colorObj = new THREE.Color();

    const FULL_CYCLE_MS = liveParams.speed + SWEEP_PAUSE_MS;
    
    // Calculates how many 1.5 degree drops it takes to hit 170 degrees total
    const TARGET_SPINS = Math.ceil(TARGET_TOTAL_DROP_DEGREES / liveParams.pitchDrop); 

    let lastValidVec = null;
    let prevDist = Number(rawScannedData[0].d); 
    
    let maxSweepAchieved = 0;
    let maxTimeRunningMs = 0;

    for (let i = 0; i < rawScannedData.length; i++) {
        let pt = rawScannedData[i];
        let moving_time_ms = pt.t - hardwareStartTime - liveParams.delay;

        if (moving_time_ms < 0) continue; 

        let sweeps = Math.floor(moving_time_ms / FULL_CYCLE_MS);
        let time_in_sweep = moving_time_ms % FULL_CYCLE_MS;
        
        if (sweeps > maxSweepAchieved) maxSweepAchieved = sweeps;
        if (moving_time_ms > maxTimeRunningMs) maxTimeRunningMs = moving_time_ms;
        
        let progress = time_in_sweep / liveParams.speed;
        let is_paused = (progress > 1.0);
        if (is_paused) progress = 1.0;

        let currentYaw = (sweeps % 2 === 0) ? progress * 360 : 360 - (progress * 360); 
        let currentPitch = liveParams.initPitch - (sweeps * liveParams.pitchDrop); 

        let distCm = Number(pt.d);
        let deltaDist = Math.abs(distCm - prevDist);

        if (distCm > 15 && distCm <= liveParams.distLimit && !is_paused) { 
            if (liveParams.edgeLimit === 200 || deltaDist <= liveParams.edgeLimit) {
                
                let radiusM = distCm / 100.0; 
                let pitchRad = currentPitch * (Math.PI / 180);
                
                let y = radiusM * Math.sin(pitchRad) + YAW_HEIGHT_OFFSET_M;
                let z = radiusM * Math.cos(pitchRad) + YAW_RADIUS_OFFSET_M;
                let x = 0;

                let vec = new THREE.Vector3(x, y, z);
                vec.applyAxisAngle(new THREE.Vector3(0, 1, 0), currentYaw * (Math.PI / 180));

                positions.push(vec.x, vec.y, vec.z);

                let hueCalc = (vec.y + 0.5) * 0.4; 
                let hue = Math.max(0, Math.min(0.8, hueCalc));
                colorObj.setHSL(hue, 1.0, 0.5);
                colors.push(colorObj.r, colorObj.g, colorObj.b);

                lastValidVec = vec;
            }
        }
        prevDist = distCm; 
    }

    pointCloudGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    pointCloudGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    pointCloudGeometry.attributes.position.needsUpdate = true;
    pointCloudGeometry.attributes.color.needsUpdate = true;

    updateProgressHUD(maxSweepAchieved, maxTimeRunningMs, FULL_CYCLE_MS, TARGET_SPINS);

    if (lastValidVec && document.getElementById("autoFollow").checked) {
        controls.target.lerp(lastValidVec, 0.05);
    }
}

// UPDATE PROGRESS UI LOGIC
function updateProgressHUD(currentSweep, runningTimeMs, fullCycleMs, targetSpins) {
    let displaySweep = Math.min(currentSweep, targetSpins);
    let progressPct = (displaySweep / targetSpins) * 100;
    
    document.getElementById('scanProgressBar').style.width = progressPct + "%";
    document.getElementById('scanProgressText').innerText = displaySweep + " / " + targetSpins + " Spins";
    
    let totalExpectedTimeMs = targetSpins * fullCycleMs;
    let timeLeftMs = Math.max(0, totalExpectedTimeMs - runningTimeMs);
    let timeLeftSecs = Math.floor(timeLeftMs / 1000);
    
    let minutes = Math.floor(timeLeftSecs / 60);
    let seconds = timeLeftSecs % 60;
    let timeString = `${minutes}:${seconds < 10 ? '0' : ''}${seconds} left`;
    
    if (displaySweep >= targetSpins) {
        document.getElementById('scanProgressBar').classList.replace('bg-primary', 'bg-success');
        document.getElementById('scanProgressBar').classList.remove('progress-bar-animated');
        document.getElementById('scanTimeLeft').innerText = "Complete!";
        document.getElementById('scanTimeLeft').className = "text-success fw-bold";
    } else {
        document.getElementById('scanProgressBar').classList.replace('bg-success', 'bg-primary');
        document.getElementById('scanProgressBar').classList.add('progress-bar-animated');
        document.getElementById('scanTimeLeft').innerText = timeString;
        document.getElementById('scanTimeLeft').className = "text-info";
    }
}

// ======================================================================
// 5. READ LIDAR DATA FROM FIREBASE
// ======================================================================

firebase.database().ref("/fromAltera").on("value", snapshot => {
    const batchData = snapshot.val();
    if (!batchData || !Array.isArray(batchData) || batchData.length === 0) return;

    if (batchData[0].t < maxTimestampProcessed - 10000) {
        maxTimestampProcessed = 0;
        isFirstHardwarePoint = true; 
    }

    let addedNewPoints = false;

    for (let i = 0; i < batchData.length; i++) {
        let pt = batchData[i];
        
        if (pt.a && i === batchData.length - 1) {
            let accPitch = Math.atan2(pt.a.z, pt.a.x) * (180 / Math.PI);
            let accRoll = Math.atan2(pt.a.y, pt.a.x) * (180 / Math.PI);
            document.getElementById("valB").innerText = Math.round(accPitch) + "°";
            document.getElementById("valC").innerText = Math.round(accRoll) + "°";
        }

        if (pt.d !== undefined && pt.t > maxTimestampProcessed) {
            if (isFirstHardwarePoint) {
                hardwareStartTime = pt.t;
                isFirstHardwarePoint = false;
            }
            rawScannedData.push(pt);
            maxTimestampProcessed = pt.t;
            addedNewPoints = true;
        }
    }

    if (addedNewPoints) {
        rebuildPointCloud(); 
        document.getElementById("valDist").innerText = rawScannedData[rawScannedData.length - 1].d + "cm";
    }
});

// ======================================================================
// 6. CONTROLS & RESET
// ======================================================================

function resetScan() {
    rawScannedData = [];
    isFirstHardwarePoint = true;
    hardwareStartTime = 0;

    pointCloudGeometry.setAttribute('position', new THREE.Float32BufferAttribute([], 3));
    pointCloudGeometry.setAttribute('color', new THREE.Float32BufferAttribute([], 3));
    
    document.getElementById("valDist").innerText = "0cm";
    
    let targetSpins = Math.ceil(TARGET_TOTAL_DROP_DEGREES / liveParams.pitchDrop);
    updateProgressHUD(0, 0, 5000, targetSpins);
    
    firebase.database().ref('toAltera').set(1);
}

window.onload = function() {
    const dbRef = firebase.database().ref('toAltera');
    const btn = document.getElementById('toggleBtn');

    dbRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val === 0) {
            if (!isScanning) {
                isScanning = true;
                isFirstHardwarePoint = true; 
                rawScannedData = []; 
                
                let targetSpins = Math.ceil(TARGET_TOTAL_DROP_DEGREES / liveParams.pitchDrop);
                updateProgressHUD(0, 0, 5000, targetSpins);
            }
            btn.innerText = "STOP SCAN";
            btn.classList.replace('btn-primary', 'btn-danger');
        } else {
            isScanning = false;
            btn.innerText = "START SCAN";
            btn.classList.replace('btn-danger', 'btn-primary');
        }
    });
};

function toggleScan() {
    firebase.database().ref('toAltera').set(!isScanning ? 0 : 2); 
}

// ======================================================================
// 7. RENDER LOOP
// ======================================================================
function animate() {
    requestAnimationFrame(animate);
    if (controls) controls.update(); 
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
